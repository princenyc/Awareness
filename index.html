<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Awareness Story Cluster Tracker</title>
  <style>
    :root {
      --red: #d0002a;
      --chartreuse: #94b23c;
      --dark-green: #4a6431;
      --cap: #2a1f1a;
      --wine: #1c0c0f;
      --paper: #fff6ee;
      --muted: #d8c9be;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--wine);
      color: var(--paper);
      line-height: 1.45;
    }

    header {
      padding: 28px 24px;
      background: linear-gradient(135deg, var(--red), var(--wine));
      border-bottom: 4px solid var(--chartreuse);
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 34px;
      letter-spacing: -0.04em;
      text-transform: uppercase;
    }

    header p {
      margin: 0;
      max-width: 760px;
      color: var(--paper);
      font-size: 15px;
    }

    main {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 18px;
      padding: 18px;
    }

    section, .panel {
      background: rgba(255, 246, 238, 0.07);
      border: 1px solid rgba(255, 246, 238, 0.18);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2, h3 {
      margin-top: 0;
      text-transform: uppercase;
      letter-spacing: -0.03em;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 12px 0 5px;
      color: var(--chartreuse);
      font-size: 13px;
      text-transform: uppercase;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(0,0,0,0.25);
      color: var(--paper);
      font-size: 14px;
    }

    textarea { min-height: 84px; resize: vertical; }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 9px;
      padding: 10px 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      background: var(--chartreuse);
      color: var(--wine);
      margin-top: 12px;
    }

    button.secondary {
      background: transparent;
      color: var(--paper);
      border: 1px solid rgba(255,246,238,0.35);
    }

    button.danger {
      background: var(--red);
      color: var(--paper);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .story-list {
      display: grid;
      gap: 12px;
    }

    .story-card {
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.13);
      border-left: 5px solid var(--chartreuse);
      border-radius: 10px;
      padding: 12px;
    }

    .story-card h3 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .tag {
      display: inline-block;
      background: rgba(148,178,60,0.16);
      color: var(--chartreuse);
      border: 1px solid rgba(148,178,60,0.4);
      border-radius: 999px;
      padding: 3px 8px;
      margin: 3px 4px 3px 0;
      font-size: 12px;
    }

    .links {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .link-item {
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .link-item a { color: var(--chartreuse); word-break: break-word; }

    .platform {
      font-size: 12px;
      color: var(--paper);
      background: var(--cap);
      border-radius: 999px;
      padding: 3px 7px;
      display: inline-block;
      margin-bottom: 5px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .empty {
      padding: 30px;
      border: 1px dashed rgba(255,255,255,0.25);
      border-radius: 12px;
      color: var(--muted);
      text-align: center;
    }

    pre {
      white-space: pre-wrap;
      background: rgba(0,0,0,0.35);
      padding: 14px;
      border-radius: 10px;
      overflow: auto;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Awareness Tracker</h1>
    <p>Capture story clusters, main sources, and social conversation links in one place. Data saves locally in your browser.</p>
  </header>

  <main>
    <aside class="panel">
      <h2>Add Story Cluster</h2>
      <label>Story Title</label>
      <input id="storyTitle" placeholder="Example: Court ruling shifts housing policy..." />

      <div class="grid-2">
        <div>
          <label>Category</label>
          <select id="storyCategory">
            <option>Politics & Policy</option>
            <option>Money & Ownership</option>
            <option>Culture & Narrative Power</option>
            <option>Institutions & Counter-Power</option>
            <option>Technology & Platforms</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label>Signal Strength</label>
          <select id="signalStrength">
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
          </select>
        </div>
      </div>

      <label>What Happened</label>
      <textarea id="whatHappened" placeholder="Plain facts. No spin."></textarea>

      <label>Why It Matters</label>
      <textarea id="whyMatters" placeholder="Power, money, law, institution, culture, material impact."></textarea>

      <label>What’s Missing / Downplayed</label>
      <textarea id="missing" placeholder="What mainstream coverage is ignoring."></textarea>

      <label>Tags</label>
      <input id="tags" placeholder="housing, courts, Black media, AI" />

      <div class="button-row">
        <button onclick="addStory()">Save Story</button>
        <button class="secondary" onclick="clearStoryForm()">Clear</button>
      </div>

      <hr style="border-color: rgba(255,255,255,0.15); margin: 22px 0;" />

      <h2>Add Link to Selected Story</h2>
      <label>Select Story</label>
      <select id="storySelect"></select>

      <label>URL</label>
      <input id="linkUrl" placeholder="https://..." />

      <div class="grid-2">
        <div>
          <label>Platform</label>
          <select id="platform">
            <option>Main Source</option>
            <option>X</option>
            <option>YouTube</option>
            <option>TikTok</option>
            <option>Instagram</option>
            <option>Threads</option>
            <option>Bluesky</option>
            <option>Substack</option>
            <option>Podcast</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label>Featured?</label>
          <select id="featured">
            <option>No</option>
            <option>Yes</option>
          </select>
        </div>
      </div>

      <label>Creator / Publication</label>
      <input id="creator" placeholder="Name or handle" />

      <label>Angle / Note</label>
      <textarea id="angle" placeholder="What this link adds to the story."></textarea>

      <div class="button-row">
        <button onclick="addLink()">Save Link</button>
        <button class="secondary" onclick="clearLinkForm()">Clear</button>
      </div>

      <hr style="border-color: rgba(255,255,255,0.15); margin: 22px 0;" />

      <div class="button-row">
        <button class="secondary" onclick="exportJSON()">Export JSON</button>
        <button class="secondary" onclick="exportMarkdown()">Export Markdown</button>
        <button class="danger" onclick="clearAll()">Clear All</button>
      </div>
    </aside>

    <section>
      <h2>Story Clusters</h2>
      <div id="stories" class="story-list"></div>
      <h2 style="margin-top:24px;">Export Output</h2>
      <pre id="exportBox">Exports will appear here.</pre>
    </section>
  </main>

  <script>
    let data = JSON.parse(localStorage.getItem('awarenessTracker') || '{"stories":[]}');

    function save() {
      localStorage.setItem('awarenessTracker', JSON.stringify(data));
      render();
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function addStory() {
      const title = document.getElementById('storyTitle').value.trim();
      if (!title) return alert('Add a story title first.');

      const story = {
        id: uid(),
        title,
        category: document.getElementById('storyCategory').value,
        signalStrength: document.getElementById('signalStrength').value,
        whatHappened: document.getElementById('whatHappened').value.trim(),
        whyMatters: document.getElementById('whyMatters').value.trim(),
        missing: document.getElementById('missing').value.trim(),
        tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(Boolean),
        links: [],
        updatedAt: new Date().toLocaleString()
      };

      data.stories.unshift(story);
      clearStoryForm();
      save();
    }

    function addLink() {
      const storyId = document.getElementById('storySelect').value;
      const story = data.stories.find(s => s.id === storyId);
      if (!story) return alert('Select a story first.');

      const url = document.getElementById('linkUrl').value.trim();
      if (!url) return alert('Add a URL first.');

      story.links.push({
        id: uid(),
        url,
        platform: document.getElementById('platform').value,
        featured: document.getElementById('featured').value,
        creator: document.getElementById('creator').value.trim(),
        angle: document.getElementById('angle').value.trim(),
        addedAt: new Date().toLocaleString()
      });

      story.updatedAt = new Date().toLocaleString();
      clearLinkForm();
      save();
    }

    function deleteStory(id) {
      if (!confirm('Delete this story cluster?')) return;
      data.stories = data.stories.filter(s => s.id !== id);
      save();
    }

    function deleteLink(storyId, linkId) {
      const story = data.stories.find(s => s.id === storyId);
      if (!story) return;
      story.links = story.links.filter(l => l.id !== linkId);
      story.updatedAt = new Date().toLocaleString();
      save();
    }

    function clearStoryForm() {
      ['storyTitle','whatHappened','whyMatters','missing','tags'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('signalStrength').value = '1';
    }

    function clearLinkForm() {
      ['linkUrl','creator','angle'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('platform').value = 'Main Source';
      document.getElementById('featured').value = 'No';
    }

    function clearAll() {
      if (!confirm('This deletes all local Awareness Tracker data in this browser. Continue?')) return;
      data = { stories: [] };
      save();
    }

    function render() {
      const container = document.getElementById('stories');
      const select = document.getElementById('storySelect');

      select.innerHTML = data.stories.map(s => `<option value="${s.id}">${escapeHTML(s.title)}</option>`).join('');

      if (!data.stories.length) {
        container.innerHTML = '<div class="empty">No story clusters yet. Add one on the left.</div>';
        return;
      }

      container.innerHTML = data.stories.map(story => {
        const links = story.links.map(link => `
          <div class="link-item">
            <span class="platform">${escapeHTML(link.platform)}${link.featured === 'Yes' ? ' · Featured' : ''}</span><br />
            <strong>${escapeHTML(link.creator || 'Unnamed source')}</strong><br />
            <a href="${escapeAttr(link.url)}" target="_blank">${escapeHTML(link.url)}</a>
            ${link.angle ? `<p>${escapeHTML(link.angle)}</p>` : ''}
            <button class="danger" onclick="deleteLink('${story.id}','${link.id}')">Delete Link</button>
          </div>
        `).join('');

        return `
          <article class="story-card">
            <h3>${escapeHTML(story.title)}</h3>
            <div class="meta">${escapeHTML(story.category)} · Signal ${escapeHTML(story.signalStrength)}/5 · ${story.links.length} links · Updated ${escapeHTML(story.updatedAt)}</div>
            <div>${story.tags.map(t => `<span class="tag">${escapeHTML(t)}</span>`).join('')}</div>
            ${story.whatHappened ? `<p><strong>What happened:</strong> ${escapeHTML(story.whatHappened)}</p>` : ''}
            ${story.whyMatters ? `<p><strong>Why it matters:</strong> ${escapeHTML(story.whyMatters)}</p>` : ''}
            ${story.missing ? `<p><strong>Missing/downplayed:</strong> ${escapeHTML(story.missing)}</p>` : ''}
            <div class="links">${links || '<div class="empty">No links added yet.</div>'}</div>
            <button class="danger" onclick="deleteStory('${story.id}')">Delete Story</button>
          </article>
        `;
      }).join('');
    }

    function exportJSON() {
      document.getElementById('exportBox').textContent = JSON.stringify(data, null, 2);
    }

    function exportMarkdown() {
      const md = data.stories.map(story => {
        const linkText = story.links.map(link => `- [${link.platform}] ${link.creator || 'Unnamed source'} — ${link.url}${link.featured === 'Yes' ? ' **FEATURED**' : ''}${link.angle ? `\n  - Angle: ${link.angle}` : ''}`).join('\n');
        return `# ${story.title}\n\n**Category:** ${story.category}\n**Signal Strength:** ${story.signalStrength}/5\n**Updated:** ${story.updatedAt}\n**Tags:** ${story.tags.join(', ')}\n\n## What happened\n${story.whatHappened || ''}\n\n## Why it matters\n${story.whyMatters || ''}\n\n## What’s missing / downplayed\n${story.missing || ''}\n\n## Links\n${linkText || 'No links yet.'}`;
      }).join('\n\n---\n\n');
      document.getElementById('exportBox').textContent = md;
    }

    function escapeHTML(str) {
      return String(str || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    }

    function escapeAttr(str) {
      return escapeHTML(str).replace(/`/g, '&#96;');
    }

    render();
  </script>
</body>
</html>
